<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 每日宝藏</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
</head>
<body>
  <header>
    <h1>💎 GitHub 每日宝藏</h1>
    <p class="subtitle">每天自动挖掘热门与宝藏开源项目</p>
    <div class="toolbar">
      <select id="date-select" title="选择日期"></select>
      <div id="category-chips" class="chips"></div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="gems">💎 每日宝藏</button>
      <button class="tab" data-tab="trending">🔥 今日热榜</button>
      <button class="tab" data-tab="newRepos">✨ 新晋高星</button>
    </nav>
  </header>
  <main id="list"></main>
  <footer>
    <p>数据来源：GitHub Trending · GitHub Search · Hacker News ｜ 每日 08:30（北京时间）自动更新</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
