name: 每日采集

on:
  schedule:
    - cron: '30 0 * * *' # UTC 0:30 = 北京时间 8:30
  workflow_dispatch: # 支持在 Actions 页面手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm ci

      - name: 抓取 Trending 与新高星项目
        run: node scripts/fetch.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 挖掘宝藏候选池
        run: node scripts/gems.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI 评选与中文简介
        run: node scripts/summarize.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 提交数据
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --cached --quiet; then
            echo '数据无变化，跳过提交'
          else
            git commit -m "数据：$(date -u +%F)"
            git push
          fi
